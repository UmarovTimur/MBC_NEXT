name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy to test server'
        required: true
        default: 'az'
        type: choice
        options:
          - az
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'develop'
        type: string

jobs:
  # ── uz: static build → FTP ────────────────────────────────────────────────
  deploy-uz:
    name: Build & Deploy uz (static → FTP)
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.5.0"

      - name: Enable Corepack
        run: corepack enable

      - name: Create .env file
        working-directory: ./apps/uz
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn workspace @mbc/uz build
        env:
          NODE_ENV: production

      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./apps/uz/out/
          server-dir: /

  # ── az + admin: SSH → git pull → build → pm2 restart ─────────────────────
  deploy-vps:
    name: Deploy az + admin to VPS
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            corepack enable
            yarn install --immutable
            yarn workspace @mbc/admin build
            yarn workspace @mbc/az build
            pm2 restart admin --update-env
            pm2 restart az --update-env

  # ── az test: workflow_dispatch → SSH test server ──────────────────────────
  deploy-az-test:
    name: Deploy az + admin → test server
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TEST_SSH_HOST }}
          username: ${{ secrets.TEST_SSH_USER }}
          key: ${{ secrets.TEST_SSH_KEY }}
          port: ${{ secrets.TEST_SSH_PORT }}
          script: |
            cd ${{ secrets.TEST_APP_PATH }}
            git fetch origin
            git checkout ${{ github.event.inputs.branch }}
            git pull origin ${{ github.event.inputs.branch }}
            corepack enable
            yarn install --frozen-lockfile
            echo "${{ secrets.ENV_FILE_AZ_TEST }}" > apps/az/.env
            echo "${{ secrets.ENV_FILE_ADMIN_TEST }}" > apps/admin/.env
            yarn workspace @mbc/admin build
            pm2 restart admin --update-env
            pm2 restart az --update-env
