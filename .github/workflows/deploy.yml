name: Deploy az + admin to VPS

on:
  push:
    branches:
      - main
    paths:
      - "apps/az/**"
      - "apps/admin/**"
      - "packages/**"
      - "ecosystem.config.cjs"
      - "package.json"
      - "yarn.lock"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy to test server'
        required: true
        default: 'az'
        type: choice
        options:
          - az
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'develop'
        type: string

jobs:
  # ── az + admin: SSH → git pull → build → pm2 restart ─────────────────────
  deploy-vps:
    name: Deploy az + admin to VPS
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            corepack enable
            yarn install --immutable
            yarn workspace @mbc/admin build
            yarn workspace @mbc/az build
            pm2 startOrRestart ecosystem.config.cjs --update-env

  # ── az test: workflow_dispatch → SSH test server ──────────────────────────
  deploy-az-test:
    name: Deploy az + admin → test server
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TEST_SSH_HOST }}
          username: ${{ secrets.TEST_SSH_USER }}
          key: ${{ secrets.TEST_SSH_KEY }}
          port: ${{ secrets.TEST_SSH_PORT }}
          script: |
            cd ${{ secrets.TEST_APP_PATH }}
            git fetch origin
            git checkout ${{ github.event.inputs.branch }}
            git pull origin ${{ github.event.inputs.branch }}
            corepack enable
            yarn install --frozen-lockfile
            echo "${{ secrets.ENV_FILE_AZ_TEST }}" > apps/az/.env
            echo "${{ secrets.ENV_FILE_ADMIN_TEST }}" > apps/admin/.env
            yarn workspace @mbc/admin build
            pm2 restart admin --update-env
            pm2 restart az --update-env
