name: Build and Deploy to FTP

on:
  push:
    branches:
      - main
      - az
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.5.0"
          cache: "yarn"
          cache-dependency-path: "app/yarn.lock"

      - name: Create .env file (main → uz)
        if: github.ref_name == 'main'
        working-directory: ./app
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Create .env file (az)
        if: github.ref_name == 'az'
        working-directory: ./app
        run: echo "${{ secrets.ENV_FILE_AZ }}" > .env

      - name: Install dependencies
        working-directory: ./app
        run: yarn install --frozen-lockfile

      - name: Build project
        working-directory: ./app
        run: yarn build
        env:
          NODE_ENV: production

      - name: Upload to FTP (uz)
        if: github.ref_name == 'main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./app/out/
          server-dir: /

      - name: Upload to FTP (az)
        if: github.ref_name == 'az'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER_AZ }}
          username: ${{ secrets.FTP_USERNAME_AZ }}
          password: ${{ secrets.FTP_PASSWORD_AZ }}
          local-dir: ./app/out/
          server-dir: /
